<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claw Control | yong1412</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --user-bubble: #238636;
            --ai-bubble: #1c2128;
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, sans-serif;
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            height: 100dvh; /* Use Dynamic Viewport Height for mobile */
            overflow: hidden;
        }

        #connection-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.4s ease;
        }

        .status-dot { width: 14px; height: 14px; border-radius: 50%; background: #484f58; margin-bottom: 20px; }
        .status-dot.online { background: #39d353; box-shadow: 0 0 20px #238636; }
        .status-dot.error { background: #f85149; }

        #start-btn {
            margin-top: 20px;
            padding: 12px 35px;
            background: var(--user-bubble);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            display: none;
            cursor: pointer;
        }

        /* FIX: Ensure container fills height but keeps input at the bottom */
        #main-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: none; 
            flex-direction: column;
            background: var(--container-bg);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        #chat-box { 
            flex: 1; /* This takes up all available space EXCEPT the input area */
            overflow-y: auto; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .message-row { display: flex; flex-direction: column; max-width: 85%; margin-bottom: 5px; }
        .user-row { align-self: flex-end; align-items: flex-end; }
        .ai-row { align-self: flex-start; align-items: flex-start; }

        .label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 3px; }
        
        .bubble { 
            padding: 10px 14px; 
            border-radius: 12px; 
            font-size: 0.9rem; 
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-row .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 2px; }
        .ai-row .bubble { background: var(--ai-bubble); border: 1px solid var(--border-color); border-bottom-left-radius: 2px; }

        .stats { font-size: 0.6rem; color: var(--text-dim); margin-top: 4px; }

        /* FIX: Anchor input area to the very bottom */
        #input-area { 
            padding: 15px; 
            background: var(--bg-color); 
            border-top: 1px solid var(--border-color); 
            display: flex; 
            gap: 10px;
            flex-shrink: 0; /* Prevents the input area from squishing */
        }

        input { 
            flex: 1; 
            padding: 12px; 
            background: var(--container-bg); 
            border: 1px solid var(--border-color); 
            color: white; 
            border-radius: 8px; 
            font-size: 16px; 
            outline: none;
        }

        button#send-btn { 
            padding: 0 18px; 
            background: var(--user-bubble); 
            border: none; 
            color: white; 
            font-weight: 600; 
            border-radius: 8px;
        }

        @media (max-width: 600px) { #main-container { border: none; } }
    </style>
</head>
<body>

    <div id="connection-overlay">
        <div id="dot" class="status-dot"></div>
        <div id="status-text">Checking Raspberry Pi 4...</div>
        <button id="start-btn" onclick="enterChat()">START CHAT</button>
    </div>

    <div id="main-container">
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const overlay = document.getElementById('connection-overlay');
        const startBtn = document.getElementById('start-btn');
        const dot = document.getElementById('dot');
        const statusMsg = document.getElementById('status-text');

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        window.onload = async function() {
            // Manual bypass timer (3 seconds)
            setTimeout(() => {
                if (startBtn.style.display !== 'block') {
                    statusMsg.innerText = "Pi connection slow...";
                    startBtn.style.display = 'block';
                    startBtn.innerText = "FORCE ENTRY";
                }
            }, 3000);

            try {
                const res = await fetch('https://ai.yong1412.my/api/tags');
                if (res.ok) {
                    dot.className = 'status-dot online';
                    statusMsg.innerText = "Raspberry Pi 4 Online";
                    startBtn.style.display = 'block';
                    startBtn.innerText = "START CHAT";
                }
            } catch (e) { console.log("Waiting for bypass..."); }
        };

        function enterChat() {
            overlay.style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
        }

        async function sendMessage() {
            const val = input.value.trim();
            if (!val) return;
            input.value = '';

            chatBox.innerHTML += `
                <div class="message-row user-row">
                    <span class="label">Kai Quan</span>
                    <div class="bubble">${val}</div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const aiRow = document.createElement('div');
            aiRow.className = 'message-row ai-row';
            aiRow.innerHTML = `<span class="label">Phi3</span><div class="bubble">...</div>`;
            chatBox.appendChild(aiRow);
            chatBox.scrollTop = chatBox.scrollHeight;

            const start = performance.now();
            try {
                const response = await fetch('https://ai.yong1412.my/api/generate', {
                    method: 'POST',
                    body: JSON.stringify({ model: 'phi3', prompt: val, stream: false })
                });
                const data = await response.json();
                const time = ((performance.now() - start) / 1000).toFixed(2);
                aiRow.querySelector('.bubble').innerText = data.response;
                aiRow.innerHTML += `<span class="stats">Response: ${time}s</span>`;
            } catch (err) {
                aiRow.querySelector('.bubble').innerText = "Request failed.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>

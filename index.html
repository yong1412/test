<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi-AI | yong1412</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --user-bubble: #238636;
            --ai-bubble: #1c2128;
            --accent: #58a6ff;
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; 
            height: 100dvh; 
            overflow: hidden;
        }

        /* --- SYSTEM BADGE --- */
        .version-badge {
            position: fixed;
            top: 15px; right: 15px;
            padding: 4px 10px;
            background: rgba(48, 54, 61, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            color: var(--text-dim);
            z-index: 1100;
        }

        /* --- CONNECTION OVERLAY --- */
        #connection-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
            transition: opacity 0.4s ease;
        }

        .status-dot { width: 14px; height: 14px; border-radius: 50%; background: #484f58; margin-bottom: 20px; transition: 0.3s; }
        .status-dot.online { background: #39d353; box-shadow: 0 0 15px #238636; }
        .status-dot.error { background: #f85149; }

        #start-btn {
            margin-top: 20px; padding: 12px 35px;
            background: var(--user-bubble); color: white;
            border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer; display: none;
        }

        /* --- CHAT UI --- */
        #main-container {
            width: 100%; max-width: 800px;
            height: 100%; display: none; 
            flex-direction: column;
            background: var(--container-bg);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        #chat-box { 
            flex: 1; overflow-y: auto; 
            padding: 20px; display: flex;
            flex-direction: column; gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .message-row { display: flex; flex-direction: column; max-width: 85%; }
        .user-row { align-self: flex-end; align-items: flex-end; }
        .ai-row { align-self: flex-start; align-items: flex-start; }

        .label { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 3px; }
        .bubble { padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .user-row .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 2px; }
        .ai-row .bubble { background: var(--ai-bubble); border: 1px solid var(--border-color); border-bottom-left-radius: 2px; }
        .stats { font-size: 0.6rem; color: var(--text-dim); margin-top: 4px; }

        #input-area { 
            padding: 15px; background: var(--bg-color); 
            border-top: 1px solid var(--border-color); 
            display: flex; gap: 10px; flex-shrink: 0;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        input { 
            flex: 1; padding: 12px; background: var(--container-bg); 
            border: 1px solid var(--border-color); color: white; 
            border-radius: 8px; font-size: 16px; outline: none;
        }

        button#send-btn { padding: 0 20px; background: var(--user-bubble); border: none; color: white; font-weight: 600; border-radius: 8px; }

        @media (max-width: 600px) { #main-container { border: none; } }
    </style>
</head>
<body>

    <div class="version-badge">v1.2.0-LOCAL</div>

    <div id="connection-overlay">
        <div id="dot" class="status-dot"></div>
        <div id="status-text">Synchronizing Local Node...</div>
        <button id="start-btn" onclick="enterChat()">START SESSION</button>
    </div>

    <div id="main-container">
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Enter prompt..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

<script>
    const input = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    const overlay = document.getElementById('connection-overlay');
    const startBtn = document.getElementById('start-btn');
    const dot = document.getElementById('dot');
    const statusMsg = document.getElementById('status-text');

    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    window.onload = async function() {
        const backup = setTimeout(() => {
            if (startBtn.style.display !== 'block') {
                statusMsg.innerHTML = "Offline/Restricted <br><small>Manual entry enabled</small>";
                startBtn.style.display = 'block';
                startBtn.style.background = "#30363d";
            }
        }, 3500);

        try {
            const res = await fetch('https://ai.yong1412.my/api/tags');
            if (res.ok) {
                clearTimeout(backup);
                dot.className = 'status-dot online';
                statusMsg.innerText = "Raspberry Pi 4 Online";
                startBtn.style.display = 'block';
            }
        } catch (e) { console.log("Connection check skipped."); }
    };

    function enterChat() {
        overlay.style.display = 'none';
        document.getElementById('main-container').style.display = 'flex';
    }

    async function sendMessage() {
        const val = input.value.trim();
        if (!val) return;
        input.value = '';

        // User Message
        chatBox.innerHTML += `
            <div class="message-row user-row">
                <span class="label">USER</span>
                <div class="bubble">${val}</div>
            </div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        // Create AI row with a live timer span
        const aiRow = document.createElement('div');
        aiRow.className = 'message-row ai-row';
        aiRow.innerHTML = `
            <span class="label">Phi3 (Local)</span>
            <div class="bubble">...</div>
            <span class="stats">Processing: <span class="live-timer">0.0</span>s</span>
        `;
        chatBox.appendChild(aiRow);
        chatBox.scrollTop = chatBox.scrollHeight;

        const timerSpan = aiRow.querySelector('.live-timer');
        const start = performance.now();
        
        // START LIVE TIMER
        const timerInterval = setInterval(() => {
            const elapsed = ((performance.now() - start) / 1000).toFixed(1);
            timerSpan.innerText = elapsed;
        }, 100);

        try {
            const response = await fetch('https://ai.yong1412.my/api/generate', {
                method: 'POST',
                body: JSON.stringify({ model: 'phi3', prompt: val, stream: false })
            });
            const data = await response.json();
            
            // STOP TIMER
            clearInterval(timerInterval);
            const finalTime = ((performance.now() - start) / 1000).toFixed(2);
            
            aiRow.querySelector('.bubble').innerText = data.response;
            aiRow.querySelector('.stats').innerText = `${finalTime}s Local Processing`;
        } catch (err) {
            clearInterval(timerInterval);
            aiRow.querySelector('.bubble').innerText = "Endpoint Unreachable.";
            aiRow.querySelector('.stats').innerText = "Failed";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>

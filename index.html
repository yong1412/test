<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claw Control | yong1412</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --user-bubble: #238636;
            --ai-bubble: #1c2128;
            --accent: #58a6ff;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* --- CONNECTION OVERLAY --- */
        #connection-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #8b949e;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .status-dot.online { background: #39d353; box-shadow: 0 0 15px #238636; }
        .status-dot.error { background: #f85149; }

        #start-btn {
            padding: 12px 30px;
            background: var(--user-bubble);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: none; /* Hidden until connected */
            transition: transform 0.2s;
        }
        #start-btn:hover { transform: scale(1.05); }

        /* --- CHAT INTERFACE --- */
        #main-container {
            width: 100%; max-width: 1000px;
            display: flex; flex-direction: column;
            background: var(--container-bg);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            visibility: hidden; /* Hidden until Start is clicked */
        }

        #chat-box { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .message-row { display: flex; flex-direction: column; max-width: 80%; }
        .message-row.user-row { align-self: flex-end; align-items: flex-end; }
        .message-row.ai-row { align-self: flex-start; align-items: flex-start; }
        .label { font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; color: var(--text-dim); text-transform: uppercase; }
        .bubble { padding: 12px 16px; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; }
        .user-row .bubble { background: var(--user-bubble); color: white; }
        .ai-row .bubble { background: var(--ai-bubble); border: 1px solid var(--border-color); }
        .stats { font-size: 0.7rem; color: var(--text-dim); margin-top: 6px; }

        #input-area { padding: 20px; background: var(--bg-color); border-top: 1px solid var(--border-color); display: flex; gap: 12px; }
        input { flex: 1; padding: 14px; background: var(--container-bg); border: 1px solid var(--border-color); color: white; border-radius: 6px; outline: none; }
        button#send-btn { padding: 0 24px; background: var(--user-bubble); border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="connection-overlay">
        <div id="dot" class="status-dot"></div>
        <h2 id="status-text" style="margin-bottom: 20px; font-weight: 400;">Pinging Raspberry Pi 4...</h2>
        <button id="start-btn" onclick="enterChat()">START CHAT</button>
    </div>

    <div id="main-container">
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Enter prompt..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // --- 1. INITIAL CONNECTION CHECK ---
        window.onload = async function() {
            const dot = document.getElementById('dot');
            const statusText = document.getElementById('status-text');
            const startBtn = document.getElementById('start-btn');

            try {
                // Check if Ollama is responsive
                const response = await fetch('https://ai.yong1412.my/api/tags');
                if (response.ok) {
                    dot.classList.add('online');
                    statusText.innerText = "Raspberry Pi 4 Connected";
                    startBtn.style.display = 'block';
                } else {
                    throw new Error();
                }
            } catch (err) {
                dot.classList.add('error');
                statusText.innerText = "Connection Failed. Check Tunnel.";
            }
        };

        function enterChat() {
            document.getElementById('connection-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('connection-overlay').style.display = 'none';
                document.getElementById('main-container').style.visibility = 'visible';
            }, 500);
        }

        // --- 2. CHAT LOGIC ---
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            const text = input.value;
            input.value = '';

            chatBox.innerHTML += `
                <div class="message-row user-row">
                    <span class="label">Kai Quan</span>
                    <div class="bubble">${text}</div>
                </div>`;

            const aiRow = document.createElement('div');
            aiRow.className = 'message-row ai-row';
            aiRow.innerHTML = `
                <span class="label">Phi3 (Pi 4)</span>
                <div class="bubble">...</div>`;
            chatBox.appendChild(aiRow);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const startTime = performance.now();
                const response = await fetch('https://ai.yong1412.my/api/generate', {
                    method: 'POST',
                    body: JSON.stringify({ model: 'phi3', prompt: text, stream: false })
                });
                const data = await response.json();
                const duration = ((performance.now() - startTime) / 1000).toFixed(2);
                
                aiRow.querySelector('.bubble').innerText = data.response;
                aiRow.innerHTML += `<span class="stats">${duration}s Latency</span>`;
            } catch (err) {
                aiRow.querySelector('.bubble').innerText = "Error reaching Pi.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>

<script>
    const input = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    const overlay = document.getElementById('connection-overlay');
    const startBtn = document.getElementById('start-btn');
    const dot = document.getElementById('dot');
    const statusMsg = document.getElementById('status-text');

    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    window.onload = async function() {
        const backup = setTimeout(() => {
            if (startBtn.style.display !== 'block') {
                statusMsg.innerHTML = "Offline/Restricted <br><small>Manual entry enabled</small>";
                startBtn.style.display = 'block';
                startBtn.style.background = "#30363d";
            }
        }, 3500);

        try {
            const res = await fetch('https://ai.yong1412.my/api/tags');
            if (res.ok) {
                clearTimeout(backup);
                dot.className = 'status-dot online';
                statusMsg.innerText = "Raspberry Pi 4 Online";
                startBtn.style.display = 'block';
            }
        } catch (e) { console.log("Connection check skipped."); }
    };

    function enterChat() {
        overlay.style.display = 'none';
        document.getElementById('main-container').style.display = 'flex';
    }

    async function sendMessage() {
        const val = input.value.trim();
        if (!val) return;
        input.value = '';

        // User Message
        chatBox.innerHTML += `
            <div class="message-row user-row">
                <span class="label">Kai Quan</span>
                <div class="bubble">${val}</div>
            </div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        // Create AI row with a live timer span
        const aiRow = document.createElement('div');
        aiRow.className = 'message-row ai-row';
        aiRow.innerHTML = `
            <span class="label">Phi3 (Local)</span>
            <div class="bubble">...</div>
            <span class="stats">Processing: <span class="live-timer">0.0</span>s</span>
        `;
        chatBox.appendChild(aiRow);
        chatBox.scrollTop = chatBox.scrollHeight;

        const timerSpan = aiRow.querySelector('.live-timer');
        const start = performance.now();
        
        // START LIVE TIMER
        const timerInterval = setInterval(() => {
            const elapsed = ((performance.now() - start) / 1000).toFixed(1);
            timerSpan.innerText = elapsed;
        }, 100);

        try {
            const response = await fetch('https://ai.yong1412.my/api/generate', {
                method: 'POST',
                body: JSON.stringify({ model: 'phi3', prompt: val, stream: false })
            });
            const data = await response.json();
            
            // STOP TIMER
            clearInterval(timerInterval);
            const finalTime = ((performance.now() - start) / 1000).toFixed(2);
            
            aiRow.querySelector('.bubble').innerText = data.response;
            aiRow.querySelector('.stats').innerText = `${finalTime}s Local Processing`;
        } catch (err) {
            clearInterval(timerInterval);
            aiRow.querySelector('.bubble').innerText = "Endpoint Unreachable.";
            aiRow.querySelector('.stats').innerText = "Failed";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi-AI Control Center</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --user-bubble: #238636;
            --ai-bubble: #1c2128;
            --accent: #58a6ff;
            --danger: #f85149;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            height: 100dvh;
            overflow: hidden;
        }

        /* --- LOGIN VAULT OVERLAY --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .login-box {
            background: var(--container-bg);
            padding: 30px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            width: 300px;
        }

        .login-box h2 {
            margin-top: 0;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            text-align: center;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--user-bubble);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #login-error {
            color: var(--danger);
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }

        /* --- HARDWARE TELEMETRY PANEL --- */
        #telemetry-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(22, 27, 34, 0.8);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            font-family: monospace;
            font-size: 11px;
            color: var(--text-dim);
            width: 100%;
        }

        .stat-item span {
            color: var(--text-main);
            font-weight: bold;
        }

        .critical-stat {
            color: var(--danger) !important;
        }

        #logout-btn {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        /* --- CONNECTION OVERLAY --- */
        #connection-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #484f58;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .status-dot.online {
            background: #39d353;
            box-shadow: 0 0 15px #238636;
        }

        /* --- CHAT UI --- */
        #main-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: none;
            flex-direction: column;
            background: var(--container-bg);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-row {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .user-row {
            align-self: flex-end;
            align-items: flex-end;
        }

        .ai-row {
            align-self: flex-start;
            align-items: flex-start;
        }

        .label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-row .bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-row .bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
        }

        .stats {
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        #input-area {
            padding: 15px;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        input#user-input {
            flex: 1;
            padding: 12px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        button#send-btn {
            padding: 0 20px;
            background: var(--user-bubble);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }

        .error-msg {
            color: var(--danger);
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }

        .toggle-link {
            font-size: 11px;
            margin-top: 15px;
            cursor: pointer;
            color: var(--text-dim);
            text-decoration: underline;
        }

        .toggle-link:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="login-box" id="login-form">
            <h2>Raspberry Pi 4 AI-Chat</h2>
            <div id="login-error" class="error-msg">ACCESS DENIED</div>
            <input type="text" id="login-user" placeholder="Username" autocomplete="off">
            <input type="password" id="login-pin" placeholder="Password" autocomplete="off">
            <button onclick="submitAuth('login')">Login</button>
            <div class="toggle-link" onclick="toggleAuthMode()">No account? Create one.</div>
        </div>

        <div class="login-box" id="signup-form" style="display: none;">
            <h2>NEW Account</h2>
            <div id="signup-error" class="error-msg">ERROR</div>
            <input type="text" id="signup-user" placeholder="Choose Username" autocomplete="off">
            <input type="password" id="signup-pin" placeholder="Choose Password" autocomplete="off">
            <button onclick="submitAuth('register')" style="background: #58a6ff;">REGISTER</button>
            <div class="toggle-link" onclick="toggleAuthMode()">Back to Login.</div>
        </div>
    </div>

    <div id="connection-overlay">
        <div id="dot" class="status-dot"></div>
        <div id="status-text" style="margin-bottom: 15px;">Establishing secure link...</div>
    </div>

    <div id="main-container">
        <div id="telemetry-bar">
            <div class="stat-item">ID: <span id="display-user">--</span></div>
            <div class="stat-item">TEMP: <span id="pi-temp">--°C</span></div>
            <div class="stat-item">RAM: <span id="pi-ram">-- MB</span></div>
            <button id="logout-btn" onclick="logout()">LOGOUT</button>
        </div>

        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Initialize command..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const loginOverlay = document.getElementById('login-overlay');
        const syncOverlay = document.getElementById('connection-overlay');
        const mainContainer = document.getElementById('main-container');
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('user-input');

        let activeUser = "";
        let conversationHistory = [];

        // Press Enter to login/send
        document.getElementById('auth-pin').addEventListener('keypress', (e) => { if (e.key === 'Enter') verifyLogin(); });
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // Check for saved session on load
        window.onload = function () {
            const savedUser = localStorage.getItem('pi_ai_user');
            if (savedUser) {
                activeUser = savedUser;
                initSystem();
            }
        };

        // (Keep the rest of your chat script, just replace the verifyLogin function!)

    function toggleAuthMode() {
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('signup-error').style.display = 'none';

        if (loginForm.style.display === 'none') {
            loginForm.style.display = 'block';
            signupForm.style.display = 'none';
        } else {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
        }
    }

    async function submitAuth(actionType) {
        let userVal, pinVal, errElement;

        if (actionType === 'login') {
            userVal = document.getElementById('login-user').value.trim();
            pinVal = document.getElementById('login-pin').value;
            errElement = document.getElementById('login-error');
        } else {
            userVal = document.getElementById('signup-user').value.trim();
            pinVal = document.getElementById('signup-pin').value;
            errElement = document.getElementById('signup-error');
        }

        if (userVal === "" || pinVal === "") {
            errElement.innerText = "FILL ALL FIELDS"; errElement.style.display = 'block'; return;
        }

        try {
            const response = await fetch('https://ai.yong1412.my/api/history.php', {
                method: 'POST',
                body: JSON.stringify({ 
                    action: actionType, 
                    username: userVal, 
                    password: pinVal 
                })
            });
            const data = await response.json();

            if (data.status === 'success') {
                if (actionType === 'register') {
                    // Success register! Auto-login.
                    activeUser = userVal;
                    localStorage.setItem('pi_ai_user', activeUser);
                    initSystem();
                } else {
                    // Success login!
                    activeUser = userVal;
                    localStorage.setItem('pi_ai_user', activeUser);
                    initSystem();
                }
            } else {
                errElement.innerText = data.message.toUpperCase();
                errElement.style.display = 'block';
            }
        } catch (e) {
            errElement.innerText = "SERVER CONNECTION FAILED";
            errElement.style.display = 'block';
        }
    }

        function logout() {
            localStorage.removeItem('pi_ai_user');
            location.reload(); // Refresh the page to lock it back up
        }

        async function initSystem() {
            loginOverlay.style.display = 'none';
            syncOverlay.style.display = 'flex';
            document.getElementById('display-user').innerText = activeUser.toUpperCase();

            try {
                await fetch('https://ai.yong1412.my/api/tags');
                document.getElementById('dot').className = 'status-dot online';
                document.getElementById('status-text').innerText = "Raspberry Pi 4 Linked.";

                setTimeout(async () => {
                    syncOverlay.style.display = 'none';
                    mainContainer.style.display = 'flex';
                    updateSystemHealth();
                    setInterval(updateSystemHealth, 2000);
                    await loadUserHistory();
                }, 800);
            } catch (e) {
                document.getElementById('status-text').innerHTML = "Offline <br><small>Proceeding anyway...</small>";
                setTimeout(() => {
                    syncOverlay.style.display = 'none';
                    mainContainer.style.display = 'flex';
                }, 1500);
            }
        }

        async function loadUserHistory() {
            try {
                // Fetch history specifically for the logged-in user
                const res = await fetch(`https://ai.yong1412.my/api/history.php?user=${activeUser}`);
                const pastMessages = await res.json();

                pastMessages.forEach(msg => {
                    conversationHistory.push({ role: msg.role, content: msg.content });

                    const cssClass = msg.role === 'user' ? 'user-row' : 'ai-row';
                    const label = msg.role === 'user' ? activeUser : 'Phi-3';

                    chatBox.innerHTML += `
                    <div class="message-row ${cssClass}">
                        <span class="label">${label}</span>
                        <div class="bubble">${msg.content}</div>
                    </div>`;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) { console.log("New user, no history."); }
        }

        async function updateSystemHealth() {
            try {
                const res = await fetch('https://ai.yong1412.my/api/health.php');
                if (!res.ok) return;
                const data = await res.json();
                document.getElementById('pi-temp').innerText = `${data.temp}°C`;
                document.getElementById('pi-ram').innerText = `${data.used_ram}`;
            } catch (e) { }
        }

        async function sendMessage() {
            const val = input.value.trim();
            if (!val) return;
            input.value = '';

            chatBox.innerHTML += `
            <div class="message-row user-row">
                <span class="label">${activeUser}</span>
                <div class="bubble">${val}</div>
            </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            conversationHistory.push({ role: 'user', content: val });

            const aiRow = document.createElement('div');
            aiRow.className = 'message-row ai-row';
            aiRow.innerHTML = `
            <span class="label">Phi-3</span>
            <div class="bubble">...</div>
            <span class="stats">Processing: <span class="live-timer">0.0</span>s</span>
        `;
            chatBox.appendChild(aiRow);
            chatBox.scrollTop = chatBox.scrollHeight;

            const timerSpan = aiRow.querySelector('.live-timer');
            const bubbleText = aiRow.querySelector('.bubble');
            const start = performance.now();
            let aiFullResponse = "";

            const timerInterval = setInterval(() => {
                timerSpan.innerText = ((performance.now() - start) / 1000).toFixed(1);
            }, 100);

            try {
                const response = await fetch('https://ai.yong1412.my/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({
                        model: 'phi3',
                        messages: conversationHistory,
                        stream: true,
                        keep_alive: '24h',
                        options: { num_ctx: 2048, num_thread: 4 }
                    })
                });

                bubbleText.innerText = '';
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        try {
                            const parsed = JSON.parse(line);
                            if (parsed.message && parsed.message.content) {
                                bubbleText.innerText += parsed.message.content;
                                aiFullResponse += parsed.message.content;
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        } catch (e) { }
                    }
                }

                clearInterval(timerInterval);
                aiRow.querySelector('.stats').innerText = `${((performance.now() - start) / 1000).toFixed(2)}s Stream Complete`;

                conversationHistory.push({ role: 'assistant', content: aiFullResponse });

                // Save to database, ATTACHED TO THE LOGGED IN USER
                fetch('https://ai.yong1412.my/api/history.php', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: activeUser,
                        userMsg: val,
                        aiMsg: aiFullResponse
                    })
                });

            } catch (err) {
                clearInterval(timerInterval);
                bubbleText.innerText = `Connection lost: ${err.message}`;
            }
        }
    </script>
</body>

</html>
